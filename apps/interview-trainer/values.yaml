app:
  name: interview-trainer
  resourceName: interview-trainer
  namespace:
    create: true
    name: interview-trainer
    annotations:
      argocd.argoproj.io/sync-options: Delete=false,Prune=false
  image:
    repository: harbor.api-api-api.com/job-application-crm/interview-trainer
    tag: sha-2e279eda75d5
  registryPullSecret:
    enabled: true
  selectorLabels:
    app: interview-trainer
  ports:
  - name: http
    containerPort: 3000
  service:
    enabled: true
    port: 80
    targetPort: 3000
  env:
    HOSTNAME: 0.0.0.0
    PORT: "3000"
    NEXT_TELEMETRY_DISABLED: "1"
  persistence:
    enabled: true
    name: data
    mountPath: /app/data
    size: 1Gi
    storageClassName: nfs-client
    accessModes:
    - ReadWriteOnce
    annotations:
      argocd.argoproj.io/sync-options: Delete=false,Prune=false
      helm.sh/resource-policy: keep
  readinessProbe:
    httpGet:
      path: /api/health
      port: 3000
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 3
  livenessProbe:
    httpGet:
      path: /api/health
      port: 3000
    initialDelaySeconds: 30
    periodSeconds: 20
    timeoutSeconds: 3
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 512Mi
  ingress:
    enabled: true
    host: interview-trainer.api-api-api.com
    tlsSecretName: interview-trainer-tls
