{{- if .Values.registryPullSecret.enabled }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.registryPullSecret.name }}
  namespace: {{ include "app.namespace" . }}
spec:
  refreshInterval: {{ .Values.registryPullSecret.refreshInterval | quote }}
  secretStoreRef:
    name: {{ .Values.registryPullSecret.secretStoreRef.name }}
    kind: {{ .Values.registryPullSecret.secretStoreRef.kind }}
  target:
    name: {{ .Values.registryPullSecret.name }}
    creationPolicy: Owner
    {{- with .Values.registryPullSecret.deletionPolicy }}
    deletionPolicy: {{ . }}
    {{- end }}
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {"auths":{"{{ .Values.registryPullSecret.registry }}":{"username":"{{ "{{ .username }}" }}","password":"{{ "{{ .password }}" }}","auth":"{{ "{{ printf \"%s:%s\" .username .password | b64enc }}" }}"}}}
  data:
    - secretKey: username
      remoteRef:
        key: {{ .Values.registryPullSecret.remoteRef.key }}
        property: {{ .Values.registryPullSecret.remoteRef.usernameProperty }}
    - secretKey: password
      remoteRef:
        key: {{ .Values.registryPullSecret.remoteRef.key }}
        property: {{ .Values.registryPullSecret.remoteRef.passwordProperty }}
{{- end }}
{{- range .Values.externalSecrets }}
{{- $secretStoreRef := default dict .secretStoreRef }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .name }}
  namespace: {{ default (include "app.namespace" $) .namespace }}
  {{- with .annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  refreshInterval: {{ default "5m" .refreshInterval | quote }}
  secretStoreRef:
    name: {{ default "vault-backend" $secretStoreRef.name }}
    kind: {{ default "ClusterSecretStore" $secretStoreRef.kind }}
  target:
    name: {{ default .name .targetName }}
    creationPolicy: {{ default "Owner" .creationPolicy }}
    {{- with .deletionPolicy }}
    deletionPolicy: {{ . }}
    {{- end }}
    {{- with .template }}
    template:
      {{- toYaml . | nindent 6 }}
    {{- end }}
  {{- with .data }}
  data:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .dataFrom }}
  dataFrom:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
