{{- if .Values.argocd.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-api
  namespace: argocd
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-production
    external-dns.alpha.kubernetes.io/hostname: {{ .Values.argocd.hostname }}
    external-dns.alpha.kubernetes.io/target: {{ .Values.tunnel.target }}
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - {{ .Values.argocd.hostname }}
      secretName: {{ .Values.argocd.tlsSecretName }}
  rules:
    - host: {{ .Values.argocd.hostname }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                port:
                  name: https
{{- end }}
