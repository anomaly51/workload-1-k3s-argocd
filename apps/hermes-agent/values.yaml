common-app:
  namespace:
    create: false
  images:
    gateway:
      repository: harbor.api-api-api.com/hermes-agent/gateway
      tag: main-19-f7c0cfc10ade126fba78186ca0714286a58659c4
  rawManifests: |
    apiVersion: v1
    kind: Namespace
    metadata:
      labels:
        app.kubernetes.io/name: hermes-agent
        app.kubernetes.io/part-of: workflow-2
      name: hermes-agent
    ---
    apiVersion: v1
    data:
      config.yaml: |
        model:
          provider: openai-codex
          default: gpt-5.3-codex
          base_url: https://chatgpt.com/backend-api/codex

        terminal:
          backend: local
          cwd: /opt/data/workspace
          timeout: 180
          lifetime_seconds: 300

        display:
          tool_progress: "new"
          busy_ack_enabled: true

        voice:
          record_key: "ctrl+b"
          max_recording_seconds: 120
          auto_tts: false
          beep_enabled: true
          silence_threshold: 200
          silence_duration: 3.0

        stt:
          enabled: true
          provider: openai
          openai:
            model: gpt-4o-transcribe

        platforms:
          telegram:
            enabled: true
            reply_to_mode: "all"
          api_server:
            enabled: true
            extra:
              host: "0.0.0.0"
              port: 8642
              model_name: "hermes-agent"

        platform_toolsets:
          telegram: [web, terminal, file, skills, todo, cronjob, messaging]
          api_server: [web, terminal, file, skills, todo, cronjob, messaging]
    kind: ConfigMap
    metadata:
      name: hermes-agent-config
      namespace: hermes-agent
    ---
    apiVersion: v1
    data:
      SKILL.md: |
        ---
        name: obsidian-inbox
        description: Capture text or transcribed Telegram voice messages into the Obsidian Inbox as Markdown notes synced by Self-hosted LiveSync.
        ---

        # Obsidian Inbox Capture

        Use this skill when the user asks to save, capture, jot down, remember, log, or add a note to Obsidian, Inbox, or the raw/unprocessed notes folder. Also use it when a Telegram voice message has been transcribed and the user intent is to record the spoken content as a note.

        ## Storage

        Default paths:

        - Vault root: `${OBSIDIAN_VAULT_DIR}` or `/opt/data/workspace/obsidian-vault`
        - Inbox folder: `${OBSIDIAN_INBOX_DIR}` or `${OBSIDIAN_VAULT_DIR}/Inbox`

        Obsidian stores notes as plain Markdown files. Do not write directly to the LiveSync CouchDB database. The `livesync-cli` sidecar mirrors the local vault directory to the existing Self-hosted LiveSync CouchDB server.

        ## Workflow

        1. Extract only the note content the user wants captured. Preserve the original meaning. Do not invent details.
        2. Create the inbox folder if it does not exist.
        3. Save one Markdown file per capture. Use a timestamped filename:
           `YYYY-MM-DD-HHMMSS-short-title.md`
        4. Add short YAML frontmatter:
           `created`, `source`, `status: inbox`.
        5. Put the captured content under `# <title>`.
        6. Do not run git commands for these notes. Sync is handled by the LiveSync CLI sidecar.
        7. Reply briefly with the saved path and say that LiveSync will replicate it.

        ## Shell Pattern

        Use `terminal` or file tools. Prefer a small Python stdlib script for safe filename slugging and Markdown writing instead of ad hoc shell escaping.
    kind: ConfigMap
    metadata:
      name: hermes-agent-obsidian-inbox-skill
      namespace: hermes-agent
    ---
    apiVersion: v1
    kind: Service
    metadata:
      labels:
        app.kubernetes.io/name: hermes-agent
        app.kubernetes.io/part-of: workflow-2
      name: hermes-agent
      namespace: hermes-agent
    spec:
      ports:
      - name: http
        port: 80
        targetPort: http
      selector:
        app.kubernetes.io/name: hermes-agent
      type: ClusterIP
    ---
    apiVersion: v1
    kind: PersistentVolumeClaim
    metadata:
      annotations:
        argocd.argoproj.io/sync-options: Delete=false,Prune=false
        helm.sh/resource-policy: keep
      labels:
        app.kubernetes.io/name: hermes-agent
        app.kubernetes.io/part-of: workflow-2
      name: hermes-agent-data
      namespace: hermes-agent
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 10Gi
      storageClassName: nfs-client
    ---
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      labels:
        app.kubernetes.io/name: hermes-agent
        app.kubernetes.io/part-of: workflow-2
      name: hermes-agent
      namespace: hermes-agent
    spec:
      replicas: 1
      selector:
        matchLabels:
          app.kubernetes.io/name: hermes-agent
      strategy:
        rollingUpdate:
          maxSurge: 0
          maxUnavailable: 1
        type: RollingUpdate
      template:
        metadata:
          annotations:
            hermes-agent/config-version: 2026-05-20-openai-stt-minimal
          labels:
            app.kubernetes.io/name: hermes-agent
            app.kubernetes.io/part-of: workflow-2
        spec:
          containers:
          - args:
            - gateway
            - run
            env:
            - name: HERMES_HOME
              value: /opt/data
            - name: HERMES_UID
              value: "10000"
            - name: HERMES_GID
              value: "10000"
            - name: HERMES_INFERENCE_PROVIDER
              value: openai-codex
            - name: HERMES_INFERENCE_MODEL
              value: gpt-5.3-codex
            - name: HERMES_CODEX_BASE_URL
              value: https://chatgpt.com/backend-api/codex
            - name: GATEWAY_ALLOW_ALL_USERS
              value: "true"
            - name: TELEGRAM_REPLY_TO_MODE
              value: all
            - name: API_SERVER_ENABLED
              value: "true"
            - name: API_SERVER_HOST
              value: 0.0.0.0
            - name: API_SERVER_PORT
              value: "8642"
            - name: API_SERVER_CORS_ORIGINS
              value: https://hermes-agent.api-api-api.com
            - name: API_SERVER_MODEL_NAME
              value: hermes-agent
            - name: STT_OPENAI_MODEL
              value: gpt-4o-transcribe
            - name: STT_OPENAI_BASE_URL
              value: https://api.openai.com/v1
            - name: OBSIDIAN_VAULT_DIR
              value: /opt/data/workspace/obsidian-vault
            - name: OBSIDIAN_INBOX_DIR
              value: /opt/data/workspace/obsidian-vault/Inbox
            envFrom:
            - secretRef:
                name: hermes-agent-env
            image: __IMAGE_gateway__
            imagePullPolicy: IfNotPresent
            livenessProbe:
              httpGet:
                path: /health
                port: http
              initialDelaySeconds: 60
              periodSeconds: 20
              timeoutSeconds: 5
            name: gateway
            ports:
            - containerPort: 8642
              name: http
            readinessProbe:
              httpGet:
                path: /health
                port: http
              initialDelaySeconds: 20
              periodSeconds: 10
              timeoutSeconds: 5
            resources:
              limits:
                cpu: "2"
                memory: 3Gi
              requests:
                cpu: 500m
                memory: 1Gi
            volumeMounts:
            - mountPath: /opt/data
              name: data
            - mountPath: /opt/data/config.yaml
              name: config
              readOnly: true
              subPath: config.yaml
            - mountPath: /opt/data/skills/obsidian-inbox
              name: obsidian-inbox-skill
              readOnly: true
          - command:
            - sh
            - -ec
            - |
              export DEBIAN_FRONTEND=noninteractive
              CLI_REF="${OBSIDIAN_LIVESYNC_CLI_REF:-0.25.62}"
              CLI_DIR="/tmp/obsidian-livesync-cli/${CLI_REF}"
              DIST="$CLI_DIR/src/apps/cli/dist/index.cjs"
              SETTINGS_DIR="$OBSIDIAN_VAULT_DIR/.livesync"
              SETTINGS="$SETTINGS_DIR/settings.json"

              if [ ! -f "$DIST" ]; then
                apt-get update
                apt-get install -y --no-install-recommends git python3 make g++ ca-certificates
                rm -rf /var/lib/apt/lists/*
                rm -rf "$CLI_DIR"
                git clone --depth 1 --branch "$CLI_REF" --recurse-submodules https://github.com/vrtmrz/obsidian-livesync.git "$CLI_DIR"
                cd "$CLI_DIR"
                if [ -f package-lock.json ]; then npm ci || npm install; else npm install; fi
                cd src/apps/cli
                npm run build
              fi

              mkdir -p "$OBSIDIAN_VAULT_DIR" "$OBSIDIAN_INBOX_DIR" "$SETTINGS_DIR"
              if ! node -e 'const fs=require("fs"); const p=process.argv[1]; const s=JSON.parse(fs.readFileSync(p,"utf8")); process.exit(s && s.isConfigured ? 0 : 1)' "$SETTINGS" 2>/dev/null; then
                echo "Configuring Self-hosted LiveSync CLI settings"
                node "$DIST" init-settings --force "$SETTINGS"
              fi

              node - "$SETTINGS" <<'NODE'
              const fs = require("fs");
              const settingsPath = process.argv[2];
              const settings = JSON.parse(fs.readFileSync(settingsPath, "utf8"));

              Object.assign(settings, {
                couchDB_URI: process.env.OBSIDIAN_LIVESYNC_URL,
                couchDB_USER: process.env.OBSIDIAN_LIVESYNC_COUCHDB_USER,
                couchDB_PASSWORD: process.env.OBSIDIAN_LIVESYNC_COUCHDB_PASSWORD,
                couchDB_DBNAME: process.env.OBSIDIAN_LIVESYNC_DB || "obsidiannotes",
                liveSync: true,
                syncOnStart: false,
                syncOnSave: false,
                usePluginSync: false,
                encrypt: true,
                passphrase: process.env.OBSIDIAN_LIVESYNC_E2EE_PASSPHRASE,
                usePathObfuscation: true,
                handleFilenameCaseSensitive: false,
                customChunkSize: 50,
                doNotUseFixedRevisionForChunks: false,
                isConfigured: true,
              });

              settings.remoteConfigurations = {};
              fs.writeFileSync(settingsPath, JSON.stringify(settings, null, 2));
              NODE

              while true; do
                node "$DIST" "$OBSIDIAN_VAULT_DIR" --settings "$SETTINGS" --interval 15 daemon || true
                echo "LiveSync daemon exited; retrying in 60s"
                sleep 60
              done
            env:
            - name: OBSIDIAN_LIVESYNC_CLI_REF
              value: 0.25.62
            - name: OBSIDIAN_LIVESYNC_URL
              value: https://obsidian-livesync.api-api-api.com
            - name: OBSIDIAN_LIVESYNC_DB
              value: obsidiannotes
            - name: OBSIDIAN_VAULT_DIR
              value: /opt/data/workspace/obsidian-vault
            - name: OBSIDIAN_INBOX_DIR
              value: /opt/data/workspace/obsidian-vault/Inbox
            envFrom:
            - secretRef:
                name: hermes-agent-env
            image: node:22-slim
            imagePullPolicy: IfNotPresent
            name: livesync-cli
            resources:
              limits:
                cpu: "2"
                memory: 3Gi
              requests:
                cpu: 500m
                memory: 1Gi
            volumeMounts:
            - mountPath: /opt/data
              name: data
          imagePullSecrets:
          - name: harbor-pull-secret
          volumes:
          - name: data
            persistentVolumeClaim:
              claimName: hermes-agent-data
          - configMap:
              name: hermes-agent-config
            name: config
          - configMap:
              name: hermes-agent-obsidian-inbox-skill
            name: obsidian-inbox-skill
    ---
    apiVersion: external-secrets.io/v1
    kind: ExternalSecret
    metadata:
      name: harbor-pull-secret
      namespace: hermes-agent
    spec:
      data:
      - remoteRef:
          conversionStrategy: Default
          decodingStrategy: None
          key: shared/harbor
          metadataPolicy: None
          nullBytePolicy: Ignore
          property: username
        secretKey: username
      - remoteRef:
          conversionStrategy: Default
          decodingStrategy: None
          key: shared/harbor
          metadataPolicy: None
          nullBytePolicy: Ignore
          property: password
        secretKey: password
      refreshInterval: 5m
      secretStoreRef:
        kind: ClusterSecretStore
        name: vault-backend
      target:
        creationPolicy: Owner
        deletionPolicy: Retain
        name: harbor-pull-secret
        template:
          data:
            .dockerconfigjson: |
              {"auths":{"harbor.api-api-api.com":{"username":"{{ .username }}","password":"{{ .password }}","auth":"{{ printf "%s:%s" .username .password | b64enc }}"}}}
          type: kubernetes.io/dockerconfigjson
    ---
    apiVersion: external-secrets.io/v1
    kind: ExternalSecret
    metadata:
      name: hermes-agent-env
      namespace: hermes-agent
    spec:
      data:
      - remoteRef:
          conversionStrategy: Default
          decodingStrategy: None
          key: workflow-2/hermes-agent
          metadataPolicy: None
          nullBytePolicy: Ignore
          property: telegram_bot_token
        secretKey: TELEGRAM_BOT_TOKEN
      - remoteRef:
          conversionStrategy: Default
          decodingStrategy: None
          key: workflow-2/hermes-agent
          metadataPolicy: None
          nullBytePolicy: Ignore
          property: hermes_auth_json
        secretKey: HERMES_AUTH_JSON_BOOTSTRAP
      - remoteRef:
          conversionStrategy: Default
          decodingStrategy: None
          key: workflow-2/hermes-agent
          metadataPolicy: None
          nullBytePolicy: Ignore
          property: api_server_key
        secretKey: API_SERVER_KEY
      - remoteRef:
          conversionStrategy: Default
          decodingStrategy: None
          key: workflow-2/hermes-agent
          metadataPolicy: None
          nullBytePolicy: Ignore
          property: openai_api_key
        secretKey: VOICE_TOOLS_OPENAI_KEY
      - remoteRef:
          conversionStrategy: Default
          decodingStrategy: None
          key: workflow-2/hermes-agent
          metadataPolicy: None
          nullBytePolicy: Ignore
          property: openai_api_key
        secretKey: OPENAI_API_KEY
      - remoteRef:
          conversionStrategy: Default
          decodingStrategy: None
          key: workflow-2/hermes-agent
          metadataPolicy: None
          nullBytePolicy: Ignore
          property: obsidian_livesync_e2ee_passphrase
        secretKey: OBSIDIAN_LIVESYNC_E2EE_PASSPHRASE
      - remoteRef:
          conversionStrategy: Default
          decodingStrategy: None
          key: workload-1/obsidian-livesync/couchdb
          metadataPolicy: None
          nullBytePolicy: Ignore
          property: adminUsername
        secretKey: OBSIDIAN_LIVESYNC_COUCHDB_USER
      - remoteRef:
          conversionStrategy: Default
          decodingStrategy: None
          key: workload-1/obsidian-livesync/couchdb
          metadataPolicy: None
          nullBytePolicy: Ignore
          property: adminPassword
        secretKey: OBSIDIAN_LIVESYNC_COUCHDB_PASSWORD
      refreshInterval: 5m
      secretStoreRef:
        kind: ClusterSecretStore
        name: vault-backend
      target:
        creationPolicy: Owner
        deletionPolicy: Retain
        name: hermes-agent-env
    ---
    apiVersion: networking.k8s.io/v1
    kind: Ingress
    metadata:
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-production
        traefik.ingress.kubernetes.io/router.middlewares: hermes-agent-hermes-agent-root-redirect@kubernetescrd
      name: hermes-agent
      namespace: hermes-agent
    spec:
      ingressClassName: traefik
      rules:
      - host: hermes-agent.api-api-api.com
        http:
          paths:
          - backend:
              service:
                name: hermes-agent
                port:
                  name: http
            path: /
            pathType: Prefix
      tls:
      - hosts:
        - hermes-agent.api-api-api.com
        secretName: hermes-agent-tls
    ---
    apiVersion: traefik.io/v1alpha1
    kind: Middleware
    metadata:
      labels:
        app.kubernetes.io/name: hermes-agent
        app.kubernetes.io/part-of: workflow-2
      name: hermes-agent-root-redirect
      namespace: hermes-agent
    spec:
      redirectRegex:
        permanent: false
        regex: ^https?://hermes-agent\.api-api-api\.com/?$
        replacement: https://hermes-agent.api-api-api.com/health
