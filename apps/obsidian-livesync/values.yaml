common-app:
  namespace:
    create: false
  images: {}
  rawManifests: |
    apiVersion: v1
    kind: Namespace
    metadata:
      labels:
        app.kubernetes.io/name: obsidian-livesync
      name: obsidian-livesync
    ---
    apiVersion: v1
    data:
      obsidian-livesync.ini: |
        [couchdb]
        single_node = true
        uuid = 2274e1a255ba5afbb55d3d51604bec1f
        max_document_size = 50000000

        [chttpd]
        bind_address = any
        port = 5984
        enable_cors = true
        max_http_request_size = 4294967296
        require_valid_user = true

        [chttpd_auth]
        require_valid_user = true
        authentication_redirect = /_utils/session.html

        [httpd]
        enable_cors = true
        WWW-Authenticate = Basic realm="couchdb"

        [cors]
        origins = app://obsidian.md,capacitor://localhost,http://localhost
        credentials = true
        headers = accept,authorization,content-type,origin,referer
        methods = GET,PUT,POST,HEAD,DELETE
        max_age = 3600
    kind: ConfigMap
    metadata:
      name: obsidian-livesync-couchdb-config
      namespace: obsidian-livesync
    ---
    apiVersion: v1
    kind: Service
    metadata:
      labels:
        app.kubernetes.io/component: couchdb
        app.kubernetes.io/name: obsidian-livesync
      name: obsidian-livesync-couchdb
      namespace: obsidian-livesync
    spec:
      ports:
      - name: http
        port: 5984
        targetPort: http
      selector:
        app.kubernetes.io/component: couchdb
        app.kubernetes.io/name: obsidian-livesync
      type: ClusterIP
    ---
    apiVersion: apps/v1
    kind: StatefulSet
    metadata:
      annotations:
        argocd.argoproj.io/sync-options: Replace=true,Delete=false,Prune=false
      labels:
        app.kubernetes.io/component: couchdb
        app.kubernetes.io/name: obsidian-livesync
      name: obsidian-livesync-couchdb
      namespace: obsidian-livesync
    spec:
      replicas: 1
      selector:
        matchLabels:
          app.kubernetes.io/component: couchdb
          app.kubernetes.io/name: obsidian-livesync
      serviceName: obsidian-livesync-couchdb
      template:
        metadata:
          labels:
            app.kubernetes.io/component: couchdb
            app.kubernetes.io/name: obsidian-livesync
        spec:
          containers:
          - env:
            - name: COUCHDB_USER
              valueFrom:
                secretKeyRef:
                  key: adminUsername
                  name: obsidian-livesync-couchdb
            - name: COUCHDB_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: adminPassword
                  name: obsidian-livesync-couchdb
            - name: COUCHDB_SECRET
              valueFrom:
                secretKeyRef:
                  key: cookieAuthSecret
                  name: obsidian-livesync-couchdb
            image: couchdb:3.5.1
            imagePullPolicy: IfNotPresent
            livenessProbe:
              initialDelaySeconds: 30
              periodSeconds: 20
              tcpSocket:
                port: http
            name: couchdb
            ports:
            - containerPort: 5984
              name: http
            readinessProbe:
              initialDelaySeconds: 10
              periodSeconds: 10
              tcpSocket:
                port: http
            resources:
              limits:
                memory: 1Gi
              requests:
                cpu: 100m
                memory: 256Mi
            volumeMounts:
            - mountPath: /opt/couchdb/data
              name: data
            - mountPath: /opt/couchdb/etc/local.d
              name: local-config
          initContainers:
          - command:
            - sh
            - -c
            - cp /config/obsidian-livesync.ini /local.d/obsidian-livesync.ini && chown
              -R 5984:5984 /opt/couchdb/data /local.d
            image: busybox:1.36
            name: fix-data-permissions
            volumeMounts:
            - mountPath: /opt/couchdb/data
              name: data
            - mountPath: /config
              name: config
            - mountPath: /local.d
              name: local-config
          securityContext:
            fsGroup: 5984
          volumes:
          - configMap:
              name: obsidian-livesync-couchdb-config
            name: config
          - emptyDir: {}
            name: local-config
      volumeClaimTemplates:
      - metadata:
          annotations:
            argocd.argoproj.io/sync-options: Delete=false,Prune=false
            helm.sh/resource-policy: keep
          name: data
        spec:
          accessModes:
          - ReadWriteOnce
          resources:
            requests:
              storage: 10Gi
          storageClassName: nfs-client
    ---
    apiVersion: external-secrets.io/v1
    kind: ExternalSecret
    metadata:
      name: obsidian-livesync-couchdb
      namespace: obsidian-livesync
    spec:
      data:
      - remoteRef:
          conversionStrategy: Default
          decodingStrategy: None
          key: workload-1/obsidian-livesync/couchdb
          metadataPolicy: None
          nullBytePolicy: Ignore
          property: adminUsername
        secretKey: adminUsername
      - remoteRef:
          conversionStrategy: Default
          decodingStrategy: None
          key: workload-1/obsidian-livesync/couchdb
          metadataPolicy: None
          nullBytePolicy: Ignore
          property: adminPassword
        secretKey: adminPassword
      - remoteRef:
          conversionStrategy: Default
          decodingStrategy: None
          key: workload-1/obsidian-livesync/couchdb
          metadataPolicy: None
          nullBytePolicy: Ignore
          property: cookieAuthSecret
        secretKey: cookieAuthSecret
      refreshInterval: 5m
      secretStoreRef:
        kind: ClusterSecretStore
        name: vault-backend
      target:
        creationPolicy: Owner
        deletionPolicy: Retain
        name: obsidian-livesync-couchdb
    ---
    apiVersion: networking.k8s.io/v1
    kind: Ingress
    metadata:
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-production
        external-dns.alpha.kubernetes.io/hostname: obsidian-livesync.api-api-api.com
        external-dns.alpha.kubernetes.io/target: bfaa4824-dabf-4534-8b2a-0cfa730ec2f1.cfargotunnel.com
      name: obsidian-livesync-couchdb
      namespace: obsidian-livesync
    spec:
      ingressClassName: traefik
      rules:
      - host: obsidian-livesync.api-api-api.com
        http:
          paths:
          - backend:
              service:
                name: obsidian-livesync-couchdb
                port:
                  number: 5984
            path: /
            pathType: Prefix
      tls:
      - hosts:
        - obsidian-livesync.api-api-api.com
        secretName: obsidian-livesync-tls
