    name: online-shop-frontend
    namespace: online-shop-frontend
  spec:
    ingressClassName: traefik
    rules:
    - host: online-shop.api-api-api.com
      http:
        paths:
        - backend:
            service:
              name: online-shop-frontend
              port:
                number: 80
          path: /
          pathType: Prefix
    tls:
    - hosts:
