---
common-app:
  namespace:
    create: false
  images:
    bot:
      repository: harbor.api-api-api.com/downloader-sloniara-bot/bot
      tag: main-43-d9d0a602bbb6c97911080dee2c8612a41a25af99
  objects:
  - apiVersion: v1
    kind: Namespace
    metadata:
      name: downloader-sloniara-bot
  - apiVersion: v1
    kind: PersistentVolumeClaim
    metadata:
      annotations:
        argocd.argoproj.io/sync-options: Delete=false,Prune=false
        helm.sh/resource-policy: keep
      name: bot-session-data
      namespace: downloader-sloniara-bot
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 1Gi
      storageClassName: nfs-client
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: bot
      namespace: downloader-sloniara-bot
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: downloader-sloniara-bot
      strategy:
        type: Recreate
      template:
        metadata:
          labels:
            app: downloader-sloniara-bot
        spec:
          initContainers:
          - command:
            - sh
            - "-c"
            - |
              if [ ! -s /session/prod_user.session ] && [ -s /session-secret/prod_user.session ]; then
                cp /session-secret/prod_user.session /session/prod_user.session
                chmod 600 /session/prod_user.session
              fi
            image: busybox:1.36
            name: seed-session
            volumeMounts:
            - mountPath: "/session-secret"
              name: bot-session
              readOnly: true
            - mountPath: "/session"
              name: session-data
          containers:
          - env:
            - name: APP_ENV
              value: prod
            - name: PYTHONUNBUFFERED
              value: '1'
            - name: SESSION_NAME
              value: "/app/session/prod_user"
            - name: PROXY_DOWNLOADER_TIMEOUT
              value: '120'
            - name: PROXY_AUTO_JOIN_SPONSORS
              value: 'true'
            - name: PROXY_DEBUG_LOG
              value: "/app/logs/proxy_bot_downloader.log"
            - name: SEND_CONTENT_TIMEOUT
              value: '180'
            envFrom:
            - secretRef:
                name: bot-env
            image: __IMAGE_bot__
            imagePullPolicy: IfNotPresent
            name: bot
            resources:
              limits:
                cpu: '1'
                memory: 2Gi
              requests:
                cpu: 100m
                memory: 256Mi
            volumeMounts:
            - mountPath: "/app/session"
              name: session-data
            - mountPath: "/app/logs"
              name: logs
            - mountPath: "/app/downloads"
              name: downloads
            - mountPath: "/app/content"
              name: content
          imagePullSecrets:
          - name: harbor-pull-secret
          terminationGracePeriodSeconds: 60
          volumes:
          - name: bot-session
            secret:
              optional: true
              secretName: bot-session
          - name: session-data
            persistentVolumeClaim:
              claimName: bot-session-data
          - emptyDir: {}
            name: logs
          - emptyDir: {}
            name: downloads
          - emptyDir: {}
            name: content
  - apiVersion: external-secrets.io/v1
    kind: ExternalSecret
    metadata:
      name: bot-env
      namespace: downloader-sloniara-bot
    spec:
      data:
      - remoteRef:
          key: workload-1/downloader-sloniara-bot
          property: api_id
        secretKey: API_ID
      - remoteRef:
          key: workload-1/downloader-sloniara-bot
          property: api_hash
        secretKey: API_HASH
      - remoteRef:
          key: workload-1/downloader-sloniara-bot
          property: phone_number
        secretKey: PHONE_NUMBER
      - remoteRef:
          key: workload-1/downloader-sloniara-bot
          property: openai_api_key
        secretKey: OPENAI_API_KEY
      - remoteRef:
          key: workload-1/downloader-sloniara-bot
          property: proxy_downloader_bot
        secretKey: PROXY_DOWNLOADER_BOT
      refreshInterval: 5m
      secretStoreRef:
        kind: ClusterSecretStore
        name: vault-backend
      target:
        creationPolicy: Owner
        name: bot-env
  - apiVersion: external-secrets.io/v1
    kind: ExternalSecret
    metadata:
      name: bot-session
      namespace: downloader-sloniara-bot
    spec:
      data:
      - remoteRef:
          key: workload-1/downloader-sloniara-bot
          property: prod_user_session_b64
        secretKey: prod_user_session_b64
      refreshInterval: 5m
      secretStoreRef:
        kind: ClusterSecretStore
        name: vault-backend
      target:
        creationPolicy: Owner
        name: bot-session
        template:
          data:
            prod_user.session: "{{ .prod_user_session_b64 | b64dec }}"
          engineVersion: v2
  - apiVersion: external-secrets.io/v1
    kind: ExternalSecret
    metadata:
      name: harbor-pull-secret
      namespace: downloader-sloniara-bot
    spec:
      data:
      - remoteRef:
          key: shared/harbor
          property: username
        secretKey: username
      - remoteRef:
          key: shared/harbor
          property: password
        secretKey: password
      refreshInterval: 1h
      secretStoreRef:
        kind: ClusterSecretStore
        name: vault-backend
      target:
        creationPolicy: Owner
        name: harbor-pull-secret
        template:
          data:
            ".dockerconfigjson": '{"auths":{"harbor.api-api-api.com":{"username":"{{
              .username }}","password":"{{ .password }}","auth":"{{ printf "%s:%s"
              .username .password | b64enc }}"}}}

'
          type: kubernetes.io/dockerconfigjson
