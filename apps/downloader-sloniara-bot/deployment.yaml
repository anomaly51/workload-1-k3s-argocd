apiVersion: apps/v1
kind: Deployment
metadata:
  name: bot
  namespace: downloader-sloniara-bot
spec:
  replicas: 0
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: downloader-sloniara-bot
  template:
    metadata:
      labels:
        app: downloader-sloniara-bot
    spec:
      imagePullSecrets:
        - name: harbor-pull-secret
      initContainers:
        - name: seed-session
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              if [ ! -s /session/prod_user.session ] && [ -s /session-secret/prod_user.session ]; then
                cp /session-secret/prod_user.session /session/prod_user.session
                chmod 600 /session/prod_user.session
              fi
          volumeMounts:
            - name: bot-session
              mountPath: /session-secret
              readOnly: true
            - name: session-data
              mountPath: /session
      containers:
        - name: bot
          image: harbor.api-api-api.com/downloader-sloniara-bot/bot:main-43-d9d0a602bbb6c97911080dee2c8612a41a25af99
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: bot-env
          env:
            - name: APP_ENV
              value: prod
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: SESSION_NAME
              value: /app/session/prod_user
            - name: PROXY_DOWNLOADER_TIMEOUT
              value: "120"
            - name: PROXY_AUTO_JOIN_SPONSORS
              value: "true"
            - name: PROXY_DEBUG_LOG
              value: /app/logs/proxy_bot_downloader.log
            - name: SEND_CONTENT_TIMEOUT
              value: "180"
          volumeMounts:
            - name: bot-main
              mountPath: /app/main.py
              subPath: main.py
              readOnly: true
            - name: session-data
              mountPath: /app/session
            - name: logs
              mountPath: /app/logs
            - name: downloads
              mountPath: /app/downloads
            - name: content
              mountPath: /app/content
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: bot-main
          configMap:
            name: bot-main
        - name: bot-session
          secret:
            secretName: bot-session
            optional: true
        - name: session-data
          emptyDir: {}
        - name: logs
          emptyDir: {}
        - name: downloads
          emptyDir: {}
        - name: content
          emptyDir: {}
