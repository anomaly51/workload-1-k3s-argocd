app:
  name: downloader-sloniara-bot
  resourceName: bot
  namespace:
    create: true
    name: downloader-sloniara-bot
  image:
    repository: harbor.api-api-api.com/downloader-sloniara-bot/bot
    tag: sha-bbcba1453c71
  registryPullSecret:
    enabled: true
  containerName: bot
  selectorLabels:
    app: downloader-sloniara-bot
  terminationGracePeriodSeconds: 60
  service:
    enabled: false
  envList:
  - name: APP_ENV
    value: prod
  - name: PYTHONUNBUFFERED
    value: "1"
  - name: SESSION_NAME
    value: /app/session/prod_user
  - name: PROXY_DOWNLOADER_TIMEOUT
    value: "120"
  - name: PROXY_AUTO_JOIN_SPONSORS
    value: "true"
  - name: PROXY_DEBUG_LOG
    value: /app/logs/proxy_bot_downloader.log
  - name: SEND_CONTENT_TIMEOUT
    value: "180"
  envFrom:
  - secretRef:
      name: bot-env
  resources:
    limits:
      cpu: "1"
      memory: 2Gi
    requests:
      cpu: 100m
      memory: 256Mi
  persistence:
    enabled: true
    name: session-data
    claimName: bot-session-data
    mountPath: /app/session
    size: 1Gi
    storageClassName: nfs-client
    accessModes:
    - ReadWriteOnce
    annotations:
      argocd.argoproj.io/sync-options: Delete=false,Prune=false
      helm.sh/resource-policy: keep
  initContainers:
  - name: seed-session
    image: busybox:1.36
    command:
    - sh
    - -c
    - |
      if [ ! -s /session/prod_user.session ] && [ -s /session-secret/prod_user.session ]; then
        cp /session-secret/prod_user.session /session/prod_user.session
        chmod 600 /session/prod_user.session
      fi
    volumeMounts:
    - name: bot-session
      mountPath: /session-secret
      readOnly: true
    - name: session-data
      mountPath: /session
  extraVolumeMounts:
  - name: logs
    mountPath: /app/logs
  - name: downloads
    mountPath: /app/downloads
  - name: content
    mountPath: /app/content
  extraVolumes:
  - name: bot-session
    secret:
      secretName: bot-session
      optional: true
  - name: logs
    emptyDir: {}
  - name: downloads
    emptyDir: {}
  - name: content
    emptyDir: {}
  externalSecrets:
  - name: bot-env
    refreshInterval: 5m
    data:
    - secretKey: API_ID
      remoteRef:
        key: workload-1/downloader-sloniara-bot
        property: api_id
    - secretKey: API_HASH
      remoteRef:
        key: workload-1/downloader-sloniara-bot
        property: api_hash
    - secretKey: PHONE_NUMBER
      remoteRef:
        key: workload-1/downloader-sloniara-bot
        property: phone_number
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: workload-1/downloader-sloniara-bot
        property: openai_api_key
    - secretKey: PROXY_DOWNLOADER_BOT
      remoteRef:
        key: workload-1/downloader-sloniara-bot
        property: proxy_downloader_bot
  - name: bot-session
    refreshInterval: 5m
    template:
      engineVersion: v2
      data:
        prod_user.session: "{{ .prod_user_session_b64 | b64dec }}"
    data:
    - secretKey: prod_user_session_b64
      remoteRef:
        key: workload-1/downloader-sloniara-bot
        property: prod_user_session_b64
