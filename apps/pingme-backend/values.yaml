              value: main-27-3b3ffe14347fb168ec203d9287867135e329aa20
            - name: APP_BASE_URL
              value: https://pingme-backend.api-api-api.com
            - name: ALGORITHM
              value: HS256
            - name: ACCESS_TOKEN_EXPIRE_MINUTES
              value: "30"
            - name: REFRESH_TOKEN_EXPIRE_DAYS
              value: "7"
            envFrom:
            - secretRef:
                name: pingme-backend-env
            image: __IMAGE_backend__
            imagePullPolicy: IfNotPresent
            livenessProbe:
              httpGet:
                path: /health
                port: http
              initialDelaySeconds: 30
              periodSeconds: 20
              timeoutSeconds: 3
            name: backend
            ports:
            - containerPort: 8000
              name: http
            readinessProbe:
              failureThreshold: 6
              httpGet:
                path: /health
                port: http
              initialDelaySeconds: 5
              periodSeconds: 5
              timeoutSeconds: 2
            resources:
              limits:
                memory: 512Mi
              requests:
                cpu: 100m
                memory: 128Mi
            volumeMounts:
            - mountPath: /code/google_services.json
              name: google-services
              readOnly: true
              subPath: google_services.json
          imagePullSecrets:
          - name: harbor-pull-secret
          initContainers:
          - command:
            - sh
            - -c
            - until nc -z postgres 5432; do sleep 2; done
            image: busybox:1.36
            imagePullPolicy: IfNotPresent
            name: wait-for-postgres
          volumes:
          - name: google-services
            secret:
              items:
              - key: google_services.json
                path: google_services.json
              secretName: pingme-backend-env
    ---
    apiVersion: apps/v1
    kind: StatefulSet
    metadata:
      annotations:
        argocd.argoproj.io/sync-wave: "-1"
      labels:
        app.kubernetes.io/name: pingme-postgres
        app.kubernetes.io/part-of: workload-1
      name: postgres
      namespace: pingme-backend
    spec:
      persistentVolumeClaimRetentionPolicy:
        whenDeleted: Retain
        whenScaled: Retain
      podManagementPolicy: OrderedReady
      replicas: 1
      revisionHistoryLimit: 10
      selector:
        matchLabels:
          app.kubernetes.io/name: pingme-postgres
      serviceName: postgres
      template:
        metadata:
          labels:
            app.kubernetes.io/name: pingme-postgres
            app.kubernetes.io/part-of: workload-1
        spec:
          containers:
          - env:
            - name: POSTGRES_DB
              value: app_db
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: password
                  name: postgres-secret
            image: postgres:15-alpine
            imagePullPolicy: IfNotPresent
            name: postgres
            ports:
            - containerPort: 5432
              name: postgres
              protocol: TCP
            readinessProbe:
              exec:
                command:
                - sh
                - -c
                - pg_isready -U postgres -d app_db
              failureThreshold: 3
              initialDelaySeconds: 5
              periodSeconds: 10
              successThreshold: 1
              timeoutSeconds: 3
            resources:
              limits:
                memory: 512Mi
              requests:
                cpu: 100m
                memory: 128Mi
