---
app:
  namespace:
    create: false
  images:
    backend:
      repository: harbor.api-api-api.com/online-shop/backend
      tag: main-20-5829f3893cf4d511ca320ab50306f348707db04d
    minio:
      repository: minio/minio
      tag: latest
  objects:
  - apiVersion: v1
    kind: Namespace
    metadata:
      name: online-shop
  - apiVersion: v1
    kind: Secret
    metadata:
      name: minio-secret
      namespace: online-shop
    stringData:
      root-password: online-shop-123123
      root-user: online-shop
    type: Opaque
  - apiVersion: v1
    kind: Service
    metadata:
      name: backend
      namespace: online-shop
    spec:
      ports:
      - port: 80
        targetPort: 8000
      selector:
        app: online-shop-backend
  - apiVersion: v1
    kind: Service
    metadata:
      name: minio
      namespace: online-shop
    spec:
      ports:
      - name: api
        port: 9000
        targetPort: 9000
      - name: console
        port: 9001
        targetPort: 9001
      selector:
        app: minio
  - apiVersion: v1
    kind: Service
    metadata:
      name: minio-vpn
      namespace: online-shop
    spec:
      ports:
      - name: api
        nodePort: 30900
        port: 9000
        targetPort: 9000
      - name: console
        nodePort: 30901
        port: 9001
        targetPort: 9001
      selector:
        app: minio
      type: NodePort
  - apiVersion: v1
    kind: Service
    metadata:
      name: postgres
      namespace: online-shop
    spec:
      ports:
      - port: 5432
      selector:
        app: postgres
  - apiVersion: v1
    kind: Service
    metadata:
      name: postgres-vpn
      namespace: online-shop
    spec:
      ports:
      - name: postgres
        nodePort: 30432
        port: 5432
        targetPort: 5432
      selector:
        app: postgres
      type: NodePort
  - apiVersion: v1
    kind: PersistentVolumeClaim
    metadata:
      annotations:
        argocd.argoproj.io/sync-options: Delete=false,Prune=false
        helm.sh/resource-policy: keep
      name: backend-uploads
      namespace: online-shop
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 5Gi
      storageClassName: nfs-client
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: backend
      namespace: online-shop
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: online-shop-backend
      template:
        metadata:
          labels:
            app: online-shop-backend
        spec:
          containers:
          - env:
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: password
                  name: postgres-secret
            - name: POSTGRES_DB
              value: app_db
            - name: CORS_ORIGINS
              value: https://online-shop.api-api-api.com
            - name: ALGORITHM
              value: HS256
            - name: ACCESS_TOKEN_EXPIRE_MINUTES
              value: '30'
            - name: REFRESH_TOKEN_EXPIRE_DAYS
              value: '7'
            - name: APP_BASE_URL
              value: https://online-shop-api.api-api-api.com
            - name: GOOGLE_CLIENT_ID
              value: 348661487643-vhgu2h4af8tm3h842ju7f4gtdkcg7k5t.apps.googleusercontent.com
            - name: ENVIRONMENT
              value: production
            - name: MINIO_ENDPOINT
              value: minio.online-shop.svc.cluster.local:9000
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  key: root-user
                  name: minio-secret
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  key: root-password
                  name: minio-secret
            - name: MINIO_BUCKET
              value: online-shop-products
            - name: MINIO_SECURE
              value: 'false'
            envFrom:
            - secretRef:
                name: backend-secret
            image: __IMAGE_backend__
            livenessProbe:
              httpGet:
                path: "/ready"
                port: 8000
              initialDelaySeconds: 20
              periodSeconds: 20
            name: backend
            ports:
            - containerPort: 8000
            readinessProbe:
              httpGet:
                path: "/health"
                port: 8000
              initialDelaySeconds: 15
              periodSeconds: 10
            volumeMounts:
            - mountPath: "/code/static/uploads"
              name: uploads
          initContainers:
          - command:
            - sh
            - "-c"
            - |
              until python - <<'PY'
              import socket
              s = socket.create_connection(("postgres.online-shop.svc.cluster.local", 5432), 2)
              s.close()
              PY
              do
                sleep 2
              done
              alembic upgrade head
            env:
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: password
                  name: postgres-secret
            - name: POSTGRES_DB
              value: app_db
            - name: CORS_ORIGINS
              value: https://online-shop.api-api-api.com
            - name: ALGORITHM
              value: HS256
            - name: ACCESS_TOKEN_EXPIRE_MINUTES
              value: '30'
            - name: REFRESH_TOKEN_EXPIRE_DAYS
              value: '7'
            - name: APP_BASE_URL
              value: https://online-shop-api.api-api-api.com
            - name: GOOGLE_CLIENT_ID
              value: 348661487643-vhgu2h4af8tm3h842ju7f4gtdkcg7k5t.apps.googleusercontent.com
            - name: ENVIRONMENT
              value: production
            - name: MINIO_ENDPOINT
              value: minio.online-shop.svc.cluster.local:9000
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  key: root-user
                  name: minio-secret
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  key: root-password
                  name: minio-secret
            - name: MINIO_BUCKET
              value: online-shop-products
            - name: MINIO_SECURE
              value: 'false'
            envFrom:
            - secretRef:
                name: backend-secret
            image: __IMAGE_backend__
            name: migrate
          volumes:
          - name: uploads
            persistentVolumeClaim:
              claimName: backend-uploads
  - apiVersion: apps/v1
    kind: StatefulSet
    metadata:
      name: minio
      namespace: online-shop
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: minio
      serviceName: minio
      template:
        metadata:
          labels:
            app: minio
        spec:
          containers:
          - args:
            - server
            - "/data"
            - "--console-address"
            - :9001
            env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  key: root-user
                  name: minio-secret
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: root-password
                  name: minio-secret
            image: __IMAGE_minio__
            name: minio
            ports:
            - containerPort: 9000
            - containerPort: 9001
            volumeMounts:
            - mountPath: "/data"
              name: data
      volumeClaimTemplates:
      - metadata:
          annotations:
            argocd.argoproj.io/sync-options: Delete=false,Prune=false
            helm.sh/resource-policy: keep
          name: data
        spec:
          accessModes:
          - ReadWriteOnce
          resources:
            requests:
              storage: 10Gi
          storageClassName: nfs-client
  - apiVersion: apps/v1
    kind: StatefulSet
    metadata:
      name: postgres
      namespace: online-shop
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: postgres
      serviceName: postgres
      template:
        metadata:
          labels:
            app: postgres
        spec:
          containers:
          - env:
            - name: POSTGRES_DB
              value: app_db
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: password
                  name: postgres-secret
            image: postgres:15-alpine
            name: postgres
            ports:
            - containerPort: 5432
            readinessProbe:
              exec:
                command:
                - sh
                - "-c"
                - pg_isready -U postgres -d app_db
              initialDelaySeconds: 5
              periodSeconds: 10
            volumeMounts:
            - mountPath: "/var/lib/postgresql/data"
              name: data
      volumeClaimTemplates:
      - metadata:
          annotations:
            argocd.argoproj.io/sync-options: Delete=false,Prune=false
            helm.sh/resource-policy: keep
          name: data
        spec:
          accessModes:
          - ReadWriteOnce
          resources:
            requests:
              storage: 5Gi
          storageClassName: nfs-client
  - apiVersion: external-secrets.io/v1
    kind: ExternalSecret
    metadata:
      name: backend-secret
      namespace: online-shop
    spec:
      data:
      - remoteRef:
          key: workload-1/online-shop-backend
          property: database_url
        secretKey: DATABASE_URL
      - remoteRef:
          key: workload-1/online-shop-backend
          property: secret_key
        secretKey: SECRET_KEY
      - remoteRef:
          key: workload-1/online-shop-backend
          property: jwt_secret_key
        secretKey: JWT_SECRET_KEY
      - remoteRef:
          key: workload-1/online-shop-backend
          property: session_secret_key
        secretKey: SESSION_SECRET_KEY
      refreshInterval: 5m
      secretStoreRef:
        kind: ClusterSecretStore
        name: vault-backend
      target:
        creationPolicy: Owner
        name: backend-secret
  - apiVersion: external-secrets.io/v1
    kind: ExternalSecret
    metadata:
      name: postgres-secret
      namespace: online-shop
    spec:
      data:
      - remoteRef:
          key: workload-1/online-shop-postgres
          property: password
        secretKey: password
      refreshInterval: 1h
      secretStoreRef:
        kind: ClusterSecretStore
        name: vault-backend
      target:
        creationPolicy: Owner
        name: postgres-secret
  - apiVersion: networking.k8s.io/v1
    kind: Ingress
    metadata:
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-production
      name: backend
      namespace: online-shop
    spec:
      ingressClassName: traefik
      rules:
      - host: online-shop-api.api-api-api.com
        http:
          paths:
          - backend:
              service:
                name: backend
                port:
                  number: 80
            path: "/"
            pathType: Prefix
      tls:
      - hosts:
        - online-shop-api.api-api-api.com
        secretName: online-shop-api-tls
