    spec:
      ports:
      - name: postgres
        port: 5432
        targetPort: postgres
      selector:
        app.kubernetes.io/name: pingme-postgres
      type: ClusterIP
    ---
    apiVersion: apps/v1
    kind: Deployment
    metadata:
