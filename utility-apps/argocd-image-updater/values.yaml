---
argocd-image-updater:
  namespaceOverride: argocd

  config:
    argocd.namespace: argocd
    interval: 10s
    git.user: github-actions[bot]
    git.email: 41898282+github-actions[bot]@users.noreply.github.com
    log.level: info
    webhook.enable: true
    webhook.port: 8082
    webhook.ratelimit-allowed: 120
    disable-tls: true
    registries:
      - name: Harbor
        prefix: harbor.api-api-api.com
        api_url: https://harbor.api-api-api.com
        ping: true
        credentials: pullsecret:argocd/argocd-image-updater-harbor

  service:
    enabled: true

  ingress:
    enabled: true
    ingressClassName: traefik
    hostname: argocd-workload-1.api-api-api.com
    path: /webhook
    pathType: Prefix
    tls:
      - secretName: argocd-api-tls-secret
        hosts:
          - argocd-workload-1.api-api-api.com

  extraObjects:
    - apiVersion: external-secrets.io/v1
      kind: ExternalSecret
      metadata:
        name: argocd-image-updater-harbor
        namespace: argocd
      spec:
        refreshInterval: 5m
        secretStoreRef:
          name: vault-backend
          kind: ClusterSecretStore
        target:
          name: argocd-image-updater-harbor
          creationPolicy: Owner
          deletionPolicy: Retain
          template:
            type: kubernetes.io/dockerconfigjson
            data:
              .dockerconfigjson: |
                {"auths":{"harbor.api-api-api.com":{"username":"{{ "{{ .username }}" }}","password":"{{ "{{ .password }}" }}","auth":"{{ "{{ printf \"%s:%s\" .username .password | b64enc }}" }}"}}}
        data:
          - secretKey: username
            remoteRef:
              key: shared/harbor
              property: username
          - secretKey: password
            remoteRef:
              key: shared/harbor
              property: password
    - apiVersion: external-secrets.io/v1
      kind: ExternalSecret
      metadata:
        name: argocd-image-updater-webhook-secret
        namespace: argocd
      spec:
        refreshInterval: 5m
        secretStoreRef:
          name: vault-backend
          kind: ClusterSecretStore
        target:
          name: argocd-image-updater-secret
          creationPolicy: Owner
          deletionPolicy: Retain
        data:
          - secretKey: webhook.harbor-secret
            remoteRef:
              key: shared/argocd-image-updater
              property: harbor_webhook_secret
    - apiVersion: external-secrets.io/v1
      kind: ExternalSecret
      metadata:
        name: argocd-image-updater-git-creds
        namespace: argocd
      spec:
        refreshInterval: 1h
        secretStoreRef:
          name: vault-backend
          kind: ClusterSecretStore
        target:
          name: argocd-image-updater-git-creds
          creationPolicy: Owner
          deletionPolicy: Retain
          template:
            data:
              username: x-access-token
              password: '{{ "{{ .token }}" }}'
        data:
          - secretKey: token
            remoteRef:
              key: shared/github
              property: token
    - apiVersion: argocd-image-updater.argoproj.io/v1alpha1
      kind: ImageUpdater
      metadata:
        name: shisha-frontend
        namespace: argocd
      spec:
        writeBackConfig:
          method: git:secret:argocd/argocd-image-updater-git-creds
          gitConfig:
            repository: https://github.com/anomaly51/workload-1-k3s-argocd.git
            branch: main
            writeBackTarget: helmvalues:./values.yaml
        applicationRefs:
          - namePattern: shisha-frontend
            images:
              - alias: app
                imageName: harbor.api-api-api.com/shisha/frontend
                commonUpdateSettings:
                  updateStrategy: newest-build
                  allowTags: regexp:^sha-[0-9a-f]{12}$
                  platforms:
                    - linux/amd64
                manifestTargets:
                  helm:
                    name: app.image.repository
                    tag: app.image.tag
