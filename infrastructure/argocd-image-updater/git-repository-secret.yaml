apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: workload-1-gitops-repository
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: workload-1-gitops-repository
    creationPolicy: Owner
    template:
      metadata:
        labels:
          argocd.argoproj.io/secret-type: repository
      data:
        type: git
        url: https://github.com/anomaly51/workload-1-k3s-argocd.git
        username: "{{ .username }}"
        password: "{{ .password }}"
  data:
    - secretKey: username
      remoteRef:
        key: shared/github/workload-1-gitops
        property: username
    - secretKey: password
      remoteRef:
        key: shared/github/workload-1-gitops
        property: token
