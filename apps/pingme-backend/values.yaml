        type: RollingUpdate
      volumeClaimTemplates:
      - apiVersion: v1
        kind: PersistentVolumeClaim
        metadata:
          annotations:
            argocd.argoproj.io/sync-options: Delete=false,Prune=false
            helm.sh/resource-policy: keep
          name: data-app-db-v3
        spec:
          accessModes:
          - ReadWriteOnce
          resources:
            requests:
              storage: 5Gi
          storageClassName: nfs-client
          volumeMode: Filesystem
    ---
