apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: harbor-helm-repository
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: harbor-helm-repository
    creationPolicy: Owner
    template:
      type: Opaque
      metadata:
        labels:
          argocd.argoproj.io/secret-type: repository
      data:
        name: harbor-helm-charts
        type: helm
        enableOCI: "true"
        url: harbor.api-api-api.com/helm-charts
        username: "{{ .username }}"
        password: "{{ .password }}"
  data:
    - secretKey: username
      remoteRef:
        key: shared/harbor
        property: username
    - secretKey: password
      remoteRef:
        key: shared/harbor
        property: password
